name: CI

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref so a rapid push sequence doesn't queue
# a backlog of checks — the newest push is the only one that matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm types:worker --check
