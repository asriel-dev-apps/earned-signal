packages:
  - apps/*
  - packages/*

allowBuilds:
  core-js-pure: false
  cpu-features: false
  esbuild: true
  protobufjs: false
  sharp: true
  ssh2: false
  workerd: true

peerDependencyRules:
  # partyserver's Workers types peer is compile-time only; Wrangler-generated
  # bindings are the source of truth for this Worker.
  ignoreMissing:
    - '@cloudflare/workers-types'

overrides:
  # drizzle-kit still reaches an obsolete esbuild through its deprecated loader.
  '@esbuild-kit/core-utils>esbuild': 0.25.12

minimumReleaseAgeExclude:
  - hono@4.12.30
  - '@hono/zod-openapi@1.5.0'
  - '@cloudflare/codemode@0.4.3'
  - agents@0.17.4
  - '@modelcontextprotocol/sdk@1.29.0'
  - '@cloudflare/workers-types@5.20260716.1'
